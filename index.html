<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrammaLab PRO: Sharing & AI</title>
    <style>
        :root { --main: #00a2ff; --ai: #6c5ce7; --bg: #f0f4f8; --text: #2d3436; --win: #00d1b2; --err: #ff3860; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
        
        header { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; color: var(--main); font-size: 22px; }

        .screen { display: none; padding: 20px; max-width: 550px; margin: 0 auto; animation: slideUp 0.4s ease; }
        .active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }

        /* КАРТОЧКИ РЕДАКТОРА */
        .editor-item { background: white; padding: 20px; border-radius: 25px; margin-bottom: 15px; border: 1px solid #e2e8f0; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
        .del-q { position: absolute; top: 12px; right: 12px; background: #fff1f2; color: var(--err); border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }
        
        .q-input { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #f1f5f9; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        .ans-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .ans-input { flex: 1; padding: 10px; border-radius: 12px; border: 2px solid #f1f5f9; font-size: 14px; outline: none; }
        input[type="radio"] { width: 22px; height: 22px; accent-color: var(--main); }

        /* БАЛЛЫ 20/100 */
        .stats { background: white; padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .score-val { font-size: 30px; font-weight: 900; color: var(--main); }
        .p-track { background: #e2e8f0; height: 12px; border-radius: 10px; overflow: hidden; margin-top: 8px; border: 2px solid white; }
        .p-bar { background: linear-gradient(90deg, var(--main), var(--ai)); height: 100%; width: 0%; transition: 0.6s ease; }

        /* КНОПКИ */
        .btn { padding: 16px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; font-size: 14px; transition: 0.2s; width: 100%; margin-bottom: 10px; text-transform: uppercase; }
        .btn-ai { background: var(--ai); color: white; box-shadow: 0 5px 0 #4c3fb3; }
        .btn-main { background: var(--main); color: white; box-shadow: 0 5px 0 #0081cc; }
        .btn-share { background: #55efc4; color: #00b894; font-weight: 900; border: 2px solid #00b894; }
        .btn:active { transform: translateY(3px); box-shadow: none; }

        /* АРЕНА */
        #stage { background: white; border-radius: 35px; height: 400px; position: relative; border: 6px solid var(--main); overflow: hidden; margin-top: 10px; display: flex; align-items: center; justify-content: center; }

        /* АНИМАЦИИ */
        .mole { width: 80px; height: 100px; background: #8d6e63; border-radius: 40px 40px 10px 10px; position: absolute; bottom: -110px; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); display: flex; align-items: center; justify-content: center; color: white; text-align: center; font-size: 11px; padding: 5px; font-weight: bold; border: 4px solid #5d4037; }
        .mole.up { bottom: 60px; }
        .cloud { position: absolute; background: white; padding: 15px 25px; border-radius: 40px; border: 3px solid var(--main); font-weight: 800; animation: fly 7s linear infinite; cursor: pointer; }
        @keyframes fly { from { left: -150px; } to { left: 110%; } }
        .wheel { width: 260px; height: 260px; border-radius: 50%; border: 8px solid var(--main); position: relative; transition: 4s cubic-bezier(0.1, 0, 0.2, 1); }
    </style>
</head>
<body>

<header>
    <div class="logo">GrammaLab MAX 💎</div>
    <div onclick="location.reload()" style="cursor:pointer; font-size: 24px;">🏠</div>
</header>

<div id="sc-menu" class="screen active">
    <h2 style="text-align: center;">Выбери игру:</h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <button class="editor-item" onclick="initEditor('mole')">🔨 Крот</button>
        <button class="editor-item" onclick="initEditor('plane')">✈️ Полет</button>
        <button class="editor-item" onclick="initEditor('anagram')">🔠 Слова</button>
        <button class="editor-item" onclick="initEditor('wheel')">🎡 Колесо</button>
        <button class="editor-item" onclick="initEditor('cards')">💡 Карты</button>
        <button class="editor-item" onclick="initEditor('slots')">🎰 Слоты</button>
        <button class="editor-item" onclick="initEditor('maze')">👾 Миссия</button>
        <button class="editor-item" onclick="initEditor('quiz')">📝 Тест</button>
    </div>
</div>

<div id="sc-editor" class="screen">
    <button class="btn btn-ai" onclick="aiMagic()">✨ ИИ: ГЕНЕРАТОР (НЕ С ГЛАГОЛАМИ)</button>
    <div id="factory"></div>
    <button class="btn btn-main" style="background:#fff; color:#333; border:2px solid #ddd;" onclick="addQ()">➕ Добавить вопрос</button>
    
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-share" onclick="exportGame()">📤 КОПИРОВАТЬ КОД</button>
        <button class="btn btn-share" onclick="importGame()">📥 ВСТАВИТЬ КОД</button>
    </div>

    <button class="btn btn-main" onclick="play()">НАЧАТЬ ИГРУ ▶️</button>
</div>

<div id="sc-game" class="screen">
    <div class="stats">
        <div class="score-val"><span id="pts">0</span> / <span id="max">100</span></div>
        <div class="p-track"><div id="bar" class="p-bar"></div></div>
    </div>
    <div id="q-txt" style="text-align:center; font-size: 22px; font-weight: 800; margin-bottom: 15px;"></div>
    <div id="stage"></div>
    <div id="ctrls" style="margin-top: 15px;"></div>
</div>

<script>
    let mode = '', data = [], cur = 0, score = 0;

    function initEditor(m) {
        mode = m;
        document.getElementById('sc-menu').classList.remove('active');
        document.getElementById('sc-editor').classList.add('active');
        if(!document.getElementById('factory').children.length) addQ();
    }

    // ТВОЙ ИИ
    function aiMagic() {
        const verbs = ["спят", "бегут", "знают", "хотят"];
        verbs.forEach(v => addQ(`Как пишется: не(${v})?`, [`не ${v}`, `не${v}`], 0));
    }

    function addQ(q="", a=["",""], ok=0) {
        const id = "r"+Math.random().toString(36).substr(2,5);
        const div = document.createElement('div');
        div.className = 'editor-item';
        div.innerHTML = `
            <button class="del-q" onclick="this.parentElement.remove()">✕</button>
            <input type="text" class="q-input" placeholder="не(спят)" value="${q}">
            <div class="ans-box">
                ${a.map((t, i) => `<div class="ans-row"><input type="radio" name="${id}" ${i==ok?'checked':''}>
                <input type="text" class="ans-input" value="${t}"></div>`).join('')}
            </div>
        `;
        document.getElementById('factory').appendChild(div);
    }

    // ПЕРЕДАЧА ИГРЫ
    function exportGame() {
        const exportData = { mode: mode, questions: [] };
        document.querySelectorAll('.editor-item').forEach(card => {
            const q = card.querySelector('.q-input').value;
            const opts = [];
            card.querySelectorAll('.ans-row').forEach(row => {
                opts.push({ t: row.querySelector('.ans-input').value, ok: row.querySelector('input[type="radio"]').checked });
            });
            if(q) exportData.questions.push({ q, opts });
        });
        const code = btoa(unescape(encodeURIComponent(JSON.stringify(exportData))));
        prompt("Скопируй этот код и отправь его:", code);
    }

    function importGame() {
        const code = prompt("Вставь код игры сюда:");
        if(!code) return;
        try {
            const imported = JSON.parse(decodeURIComponent(escape(atob(code))));
            mode = imported.mode;
            document.getElementById('factory').innerHTML = "";
            imported.questions.forEach(q => addQ(q.q, q.opts.map(o=>o.t), q.opts.findIndex(o=>o.ok)));
            alert("Игра успешно загружена!");
        } catch(e) { alert("Ошибка кода!"); }
    }

    function play() {
        data = [];
        document.querySelectorAll('.editor-item').forEach(card => {
            const q = card.querySelector('.q-input').value;
            const opts = [];
            card.querySelectorAll('.ans-row').forEach(row => {
                const t = row.querySelector('.ans-input').value;
                if(t) opts.push({ t, isOk: row.querySelector('input[type="radio"]').checked });
            });
            if(q) data.push({ q, opts });
        });
        if(!data.length) return alert("Нет вопросов!");
        document.getElementById('sc-editor').classList.remove('active');
        document.getElementById('sc-game').classList.add('active');
        document.getElementById('max').innerText = data.length * 10;
        cur = 0; score = 0; render();
    }

    function render() {
        const it = data[cur]; const st = document.getElementById('stage'); const ct = document.getElementById('ctrls');
        st.innerHTML = ""; ct.innerHTML = "";
        document.getElementById('q-txt').innerText = it.q;
        document.getElementById('pts').innerText = score;
        document.getElementById('bar').style.width = (cur / data.length * 100) + "%";

        if(mode === 'mole') {
            it.opts.forEach((o, i) => {
                const h = document.createElement('div'); h.style=`width:80px; height:20px; background:#333; border-radius:50%; position:absolute; bottom:50px; left:${20+i*140}px;`;
                const m = document.createElement('div'); m.className='mole'; m.innerText=o.t;
                m.onclick = () => o.isOk ? win() : (m.style.background="var(--err)");
                h.appendChild(m); st.appendChild(h);
                setTimeout(() => m.classList.add('up'), 200+i*200);
            });
        } else if(mode === 'plane') {
            it.opts.forEach((o, i) => {
                const c = document.createElement('div'); c.className='cloud'; c.innerText=o.t;
                c.style.top = (40 + i*100) + "px"; c.onclick = () => o.isOk ? win() : (c.style.background="red");
                st.appendChild(c);
            });
        } else if(mode === 'wheel') {
            const w = document.createElement('div'); w.className='wheel'; st.appendChild(w);
            const b = document.createElement('button'); b.className='btn btn-main'; b.innerText="КРУТИТЬ";
            b.onclick = () => { w.style.transform = `rotate(${3600+Math.random()*360}deg)`; setTimeout(()=>showBtns(it, ct), 4000); };
            ct.appendChild(b);
        } else { showBtns(it, ct); }
    }

    function showBtns(it, ct) {
        it.opts.forEach(o => {
            const b = document.createElement('button'); b.className='btn btn-main'; b.innerText=o.t;
            b.onclick = () => o.isOk ? win() : (b.style.background="var(--err)");
            ct.appendChild(b);
        });
    }

    function win() {
        score += 10; cur++;
        if(cur < data.length) render(); else { alert("Победа! Счёт: " + score); location.reload(); }
    }
</script>
</body>
</html>
