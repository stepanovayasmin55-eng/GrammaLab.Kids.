<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrammaLab PRO: 8 IN 1 AI</title>
    <style>
        :root {
            --main: #00a2ff; --bg: #f8fafc; --text: #1e293b;
            --ai: #6c5ce7; --win: #22c55e; --err: #ff4757;
            --card-radius: 28px;
        }

        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg); color: var(--text); overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* ШАПКА */
        header {
            background: white; padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .logo-text { font-weight: 900; color: var(--main); font-size: 24px; letter-spacing: -1px; }

        /* КОНТЕЙНЕРЫ ЭКРАНОВ */
        .screen { display: none; padding: 20px; max-width: 600px; margin: 0 auto; min-height: 90vh; }
        .screen.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* КАРТОЧКИ РЕДАКТОРА (КАК НА ТВОЕМ ФОТО) */
        .editor-card {
            background: white; padding: 25px; border-radius: var(--card-radius);
            margin-bottom: 20px; border: 1px solid #e2e8f0; position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
        }
        .btn-delete {
            position: absolute; top: 15px; right: 15px;
            background: #fff1f2; color: var(--err); border: none;
            border-radius: 50%; width: 35px; height: 35px; cursor: pointer;
            font-weight: bold; font-size: 18px; transition: 0.2s;
        }
        .btn-delete:hover { background: var(--err); color: white; }

        .input-q {
            width: 100%; padding: 18px; border-radius: 20px;
            border: 2px solid #f1f5f9; font-size: 18px; box-sizing: border-box;
            margin-bottom: 20px; outline: none; background: #fdfdfe;
        }
        .input-q:focus { border-color: var(--main); }

        .ans-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .input-a { flex: 1; padding: 14px; border-radius: 16px; border: 2px solid #f1f5f9; font-size: 16px; outline: none; }
        input[type="radio"] { width: 28px; height: 28px; accent-color: var(--main); cursor: pointer; }

        /* ИНДИКАТОР БАЛЛОВ 20/100 */
        .score-board {
            background: white; padding: 20px; border-radius: 25px;
            text-align: center; margin-bottom: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .score-num { font-size: 36px; font-weight: 900; color: var(--main); line-height: 1; }
        .progress-track { background: #e2e8f0; height: 14px; border-radius: 20px; margin-top: 15px; overflow: hidden; border: 3px solid white; }
        .progress-fill { background: linear-gradient(90deg, var(--main), var(--ai)); height: 100%; width: 0%; transition: 0.8s cubic-bezier(0.22, 1, 0.36, 1); }

        /* КНОПКИ УПРАВЛЕНИЯ */
        .btn {
            padding: 18px; border-radius: 22px; border: none;
            font-weight: 800; cursor: pointer; font-size: 17px;
            transition: 0.2s; width: 100%; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-ai { background: var(--ai); color: white; box-shadow: 0 6px 0 #4c3fb3; }
        .btn-play { background: var(--main); color: white; box-shadow: 0 6px 0 #0081cc; }
        .btn-secondary { background: white; color: var(--text); border: 2px solid #e2e8f0; }
        .btn:active { transform: translateY(4px); box-shadow: none; }

        /* ИГРОВОЕ ПОЛЕ */
        #game-stage {
            background: white; border-radius: 40px; height: 450px;
            position: relative; border: 8px solid var(--main);
            overflow: hidden; margin-top: 15px; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }

        /* АНИМАЦИИ ОБЪЕКТОВ */
        .game-obj-mole {
            width: 90px; height: 120px; background: #8d6e63;
            border-radius: 45px 45px 10px 10px; position: absolute;
            bottom: -130px; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            display: flex; align-items: center; justify-content: center;
            color: white; text-align: center; font-size: 12px; padding: 8px;
            font-weight: bold; border: 5px solid #5d4037; cursor: pointer;
        }
        .game-obj-mole.active { bottom: 70px; }

        .game-obj-cloud {
            position: absolute; background: white; padding: 20px 30px;
            border-radius: 50px; border: 4px solid var(--main);
            font-weight: 900; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            animation: cloudRun 9s linear infinite;
        }
        @keyframes cloudRun { from { left: -250px; } to { left: 110%; } }

        .game-wheel {
            width: 300px; height: 300px; border-radius: 50%;
            border: 10px solid var(--main); position: relative;
            transition: 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .game-letter {
            display: inline-block; padding: 15px 22px; background: white;
            border: 4px solid var(--main); border-radius: 18px; margin: 8px;
            font-size: 28px; font-weight: 900; cursor: pointer;
            box-shadow: 0 6px 0 var(--main);
        }

        .game-card-flip {
            width: 220px; height: 300px; background: var(--main);
            color: white; border-radius: 25px; display: flex;
            align-items: center; justify-content: center; font-size: 22px;
            padding: 25px; text-align: center; cursor: pointer;
            transition: 0.6s;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-text">GrammaLab MAX AI 💎</div>
    <div onclick="location.reload()" style="font-size: 30px; cursor: pointer;">🏠</div>
</header>

<div id="screen-menu" class="screen active">
    <h2 style="text-align: center; margin-bottom: 30px;">Выберите режим (8 игр):</h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="editor-card" style="cursor:pointer; text-align:center; margin:0;" onclick="startEditor('mole')">🔨<br>Крот</div>
        <div class="editor-card" style="cursor:pointer; text-align:center; margin:0;" onclick="startEditor('plane')">✈️<br>Полет</div>
        <div class="editor-card" style="cursor:pointer; text-align:center; margin:0;" onclick="startEditor('anagram')">🔠<br>Слова</div>
        <div class="editor-card" style="cursor:pointer; text-align:center; margin:0;" onclick="startEditor('wheel')">🎡<br>Колесо</div>
        <div class="editor-card" style="cursor:pointer; text-align:center; margin:0;" onclick="startEditor('cards')">💡<br>Карты</div>
        <div class="editor-card" style="cursor:pointer; text-align:center; margin:0;" onclick="startEditor('slots')">🎰<br>Слоты</div>
        <div class="editor-card" style="cursor:pointer; text-align:center; margin:0;" onclick="startEditor('maze')">👾<br>Миссия</div>
        <div class="editor-card" style="cursor:pointer; text-align:center; margin:0;" onclick="startEditor('quiz')">📝<br>Тест</div>
    </div>
</div>

<div id="screen-editor" class="screen">
    <button class="btn btn-ai" onclick="generateAI()">✨ ИИ: СОЗДАТЬ УПРАЖНЕНИЕ</button>
    <div id="cards-container"></div>
    <button class="btn btn-secondary" onclick="addNewCard()">➕ Добавить вопрос вручную</button>
    <button class="btn btn-play" onclick="initGame()">ИГРАТЬ ▶️</button>
</div>

<div id="screen-game" class="screen">
    <div class="score-board">
        <div class="score-num"><span id="live-points">0</span> / <span id="max-points">100</span></div>
        <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
    </div>
    <div id="game-question" style="text-align:center; font-size: 26px; font-weight: 800; margin-bottom: 20px; color: var(--ai);"></div>
    <div id="game-stage"></div>
    <div id="game-controls" style="margin-top: 25px; width: 100%;"></div>
</div>

<div id="screen-result" class="screen" style="text-align:center;">
    <div style="font-size: 120px;">🏆</div>
    <h1 style="font-size: 46px; color: var(--main);">ПОБЕДА!</h1>
    <p style="font-size: 28px;">Ваш результат: <span id="final-score" style="font-weight:900;">0</span></p>
    <button class="btn btn-play" onclick="location.reload()">В МЕНЮ</button>
</div>

<script>
    let currentGameMode = '';
    let questionData = [];
    let currentIdx = 0;
    let userPoints = 0;

    function startEditor(mode) {
        currentGameMode = mode;
        document.getElementById('screen-menu').classList.remove('active');
        document.getElementById('screen-editor').classList.add('active');
        if(document.getElementById('cards-container').children.length === 0) addNewCard();
    }

    // ИИ ГЕНЕРАТОР: НЕ С ГЛАГОЛАМИ
    function generateAI() {
        const topic = prompt("Введите правило (например: не с глаголами):");
        if(!topic) return;

        if(topic.toLowerCase().includes("не")) {
            const list = [
                {q: "не(спят)", a: ["не спят", "неспят"], c: 0},
                {q: "не(знают)", a: ["не знают", "незнают"], c: 0},
                {q: "не(хотят)", a: ["не хотят", "нехотят"], c: 0}
            ];
            list.forEach(item => addNewCard(item.q, item.a, item.c));
        } else {
            addNewCard(`Как пишется правильно: ${topic}?`, ["Вариант 1", "Вариант 2"], 0);
        }
    }

    function addNewCard(qText = "", answers = ["", ""], correctIdx = 0) {
        const cardId = "card_" + Math.random().toString(36).substr(2, 9);
        const card = document.createElement('div');
        card.className = 'editor-card';
        card.innerHTML = `
            <button class="btn-delete" onclick="this.parentElement.remove()">✕</button>
            <input type="text" class="input-q" placeholder="Текст вопроса (например: не(спят))" value="${qText}">
            <div class="answers-list">
                ${answers.map((ans, i) => `
                    <div class="ans-row">
                        <input type="radio" name="${cardId}" ${i === correctIdx ? 'checked' : ''}>
                        <input type="text" class="input-a" placeholder="Ответ ${i+1}" value="${ans}">
                    </div>
                `).join('')}
            </div>
            <button onclick="addVariant(this)" style="background:none; border:none; color:var(--main); font-weight:bold; cursor:pointer; margin-top:10px;">+ Вариант</button>
        `;
        document.getElementById('cards-container').appendChild(card);
    }

    function addVariant(btn) {
        const list = btn.previousElementSibling;
        const name = list.querySelector('input[type="radio"]').name;
        const row = document.createElement('div');
        row.className = 'ans-row';
        row.innerHTML = `<input type="radio" name="${name}"><input type="text" class="input-a" placeholder="Вариант">`;
        list.appendChild(row);
    }

    function initGame() {
        questionData = [];
        document.querySelectorAll('.editor-card').forEach(card => {
            const q = card.querySelector('.input-q').value;
            const options = [];
            card.querySelectorAll('.ans-row').forEach(row => {
                const text = row.querySelector('.input-a').value;
                if(text) options.push({ text: text, isCorrect: row.querySelector('input[type="radio"]').checked });
            });
            if(q && options.length > 0) questionData.push({ q, options });
        });

        if(questionData.length === 0) return alert("Создайте вопросы!");
        
        document.getElementById('screen-editor').classList.remove('active');
        document.getElementById('screen-game').classList.add('active');
        document.getElementById('max-points').innerText = questionData.length * 10;
        
        currentIdx = 0; userPoints = 0;
        renderStep();
    }

    function renderStep() {
        const item = questionData[currentIdx];
        const stage = document.getElementById('game-stage');
        const controls = document.getElementById('game-controls');
        stage.innerHTML = ""; controls.innerHTML = "";
        
        document.getElementById('game-question').innerText = item.q;
        document.getElementById('live-points').innerText = userPoints;
        document.getElementById('progress-fill').style.width = (currentIdx / questionData.length * 100) + "%";

        // ЛОГИКА 8 ИГР
        if(currentGameMode === 'mole') {
            item.options.forEach((opt, i) => {
                const hole = document.createElement('div');
                hole.style = `width:100px; height:30px; background:#2c3e50; border-radius:50%; position:absolute; bottom:60px; left:${20+i*160}px;`;
                const mole = document.createElement('div'); mole.className = 'game-obj-mole'; mole.innerText = opt.text;
                mole.onclick = () => opt.isCorrect ? handleWin() : (mole.style.background="var(--err)");
                hole.appendChild(mole); stage.appendChild(hole);
                setTimeout(() => mole.classList.add('active'), 200 + i*200);
            });
        } 
        else if(currentGameMode === 'plane') {
            item.options.forEach((opt, i) => {
                const cloud = document.createElement('div'); cloud.className = 'game-obj-cloud'; cloud.innerText = opt.text;
                cloud.style.top = (50 + i*110) + "px"; 
                cloud.onclick = () => opt.isCorrect ? handleWin() : (cloud.style.background="#fee2e2");
                stage.appendChild(cloud);
            });
        }
        else if(currentGameMode === 'wheel') {
            const wheel = document.createElement('div'); wheel.className = 'game-wheel';
            item.options.forEach((o, i) => {
                const s = document.createElement('div');
                s.style = `position:absolute; width:50%; height:50%; background:${i%2?'#fff':'#f0f7ff'}; transform-origin:100% 100%; transform:rotate(${i*(360/item.options.length)}deg) skewY(${90-(360/item.options.length)}deg); border:1px solid #ccc;`;
                wheel.appendChild(s);
            });
            stage.appendChild(wheel);
            const btn = document.createElement('button'); btn.className = 'btn btn-play'; btn.innerText = "КРУТИТЬ";
            btn.onclick = () => { wheel.style.transform = `rotate(${3600 + Math.random()*360}deg)`; setTimeout(() => showButtons(item, controls), 4000); };
            controls.appendChild(btn);
        }
        else if(currentGameMode === 'anagram') {
            const word = item.options.find(o => o.isCorrect).text.toUpperCase().replace(/\s/g, '');
            let userStr = "";
            const view = document.createElement('div'); view.style="font-size:45px; font-weight:900; color:var(--main); margin-bottom:30px;"; stage.appendChild(view);
            word.split('').sort(()=>Math.random()-0.5).forEach(l => {
                const b = document.createElement('div'); b.className = 'game-letter'; b.innerText = l;
                b.onclick = () => { userStr += l; view.innerText = userStr; if(userStr === word) handleWin(); };
                stage.appendChild(b);
            });
        }
        else if(currentGameMode === 'cards') {
            const card = document.createElement('div'); card.className = 'game-card-flip'; card.innerText = "Узнать ответ";
            card.onclick = () => { card.innerText = item.options.find(o=>o.isCorrect).text; card.style.background = "var(--win)"; setTimeout(handleWin, 2000); };
            stage.appendChild(card);
        }
        else if(currentGameMode === 'slots') {
            stage.innerHTML = '<div style="font-size:60px; background:#1a1a1a; padding:25px; border-radius:20px; color:gold;">🎰 🎰 🎰</div>';
            setTimeout(() => showButtons(item, controls), 1200);
        }
        else if(currentGameMode === 'maze') {
            stage.innerHTML = '<div style="width:40px; height:40px; background:var(--ai); position:absolute; border-radius:50%; transition:0.3s;" id="maze-p"></div>';
            showButtons(item, controls);
        }
        else {
            showButtons(item, controls);
        }
    }

    function showButtons(item, container) {
        item.options.forEach(opt => {
            const btn = document.createElement('button'); btn.className = 'btn btn-play'; btn.innerText = opt.text;
            btn.onclick = () => opt.isCorrect ? handleWin() : (btn.style.background="var(--err)");
            container.appendChild(btn);
        });
    }

    function handleWin() {
        userPoints += 10; currentIdx++;
        if(currentIdx < questionData.length) renderStep(); else finishGame();
    }

    function finishGame() {
        document.getElementById('screen-game').classList.remove('active');
        document.getElementById('screen-result').classList.add('active');
        document.getElementById('final-score').innerText = userPoints;
    }
</script>
</body>
</html>
