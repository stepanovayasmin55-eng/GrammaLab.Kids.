<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrammaLab GitHub Edition</title>
    <style>
        :root { 
            --p: #0984e3; --bg: #fdfdfd; --ai: #6c5ce7; --s: #00b894; --r: #d63031; 
            --dark: #2d3436; --accent: #fdcb6e;
        }
        body { 
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); overflow: hidden; touch-action: none;
        }

        /* АНИМИРОВАННЫЙ ФОН ДЛЯ МЕНЮ */
        .bg-mesh {
            position: fixed; inset: 0; z-index: -1;
            background-image: radial-gradient(var(--ai) 0.5px, transparent 0.5px);
            background-size: 20px 20px; opacity: 0.1;
        }

        header { 
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            border-bottom: 5px solid var(--ai); position: relative; z-index: 100;
        }

        .btn-home { 
            background: var(--ai); color: #fff; border: none; padding: 10px 20px; 
            border-radius: 12px; cursor: pointer; font-weight: 900; 
            box-shadow: 0 4px 0 #4834d4; transition: 0.2s;
        }

        .btn-home:active { transform: translateY(4px); box-shadow: 0 0 0 #4834d4; }

        .score-box { text-align: right; line-height: 1; }
        #sc-val { font-size: 1.5rem; font-weight: 900; color: var(--dark); }

        .screen { display: none; padding: 25px; height: calc(100vh - 80px); box-sizing: border-box; overflow-y: auto; }
        .active { display: block; animation: slideUp 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .btn { 
            padding: 20px; border-radius: 20px; border: none; font-weight: 900; 
            cursor: pointer; width: 100%; margin: 10px 0; font-size: 16px;
            transition: all 0.3s; position: relative; overflow: hidden;
            box-shadow: 0 8px 0 rgba(0,0,0,0.05);
        }
        .btn-p { background: var(--p); color: #fff; }
        .btn-ai { background: var(--ai); color: #fff; }
        .btn-w { background: #fff; color: var(--dark); border: 2px solid #eee; }

        #stage { 
            height: 400px; position: relative; overflow: hidden; 
            background: #fff; border-radius: 35px; border: 6px solid var(--dark); 
            margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        #player { 
            width: 35px; height: 35px; background: var(--ai); position: absolute; 
            border-radius: 12px; z-index: 10; border: 4px solid #fff; 
            box-shadow: 0 0 25px rgba(108, 92, 231, 0.6);
        }

        .mole { 
            width: 90px; height: 90px; background: var(--ai); color: #fff; 
            position: absolute; bottom: -110px; border-radius: 45px 45px 15px 15px; 
            display: flex; align-items: center; justify-content: center; 
            text-align: center; font-size: 11px; transition: 0.5s; font-weight: bold;
            border: 4px solid #4834d4;
        }
        .mole.up { bottom: 40px; }

        .letter { 
            width: 60px; height: 60px; background: var(--ai); color: #fff; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 30px; font-weight: 900; border-radius: 18px; 
            box-shadow: 0 6px 0 #4834d4; margin: 8px; cursor: pointer;
        }

        #joy-base { 
            width: 120px; height: 120px; background: rgba(0,0,0,0.05); 
            border-radius: 50%; position: relative; margin: 0 auto; 
            display: none; border: 4px dashed #ddd; touch-action: none;
        }
        #joy-stick { 
            width: 55px; height: 55px; background: var(--ai); border-radius: 50%; 
            position: absolute; left: 32.5px; top: 32.5px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card-editor { 
            background: #fff; padding: 25px; border-radius: 25px; margin-bottom: 20px; 
            border-left: 12px solid var(--ai); box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .inp { width: 100%; margin: 10px 0; padding: 15px; border-radius: 15px; border: 2px solid #eee; font-size: 16px; outline: none; }
        .inp:focus { border-color: var(--ai); }
    </style>
</head>
<body>
<div class="bg-mesh"></div>

<header>
    <button class="btn-home" onclick="location.reload()">🏠 МЕНЮ</button>
    <div class="score-box">
        <div id="sc-val">0 ⭐</div>
        <div style="font-size: 10px; opacity: 0.5;">РЕКОРД: <span id="high-score">0</span></div>
    </div>
</header>

<div id="sc-menu" class="screen active">
    <h2 style="text-align: center; color: var(--dark); font-weight: 900;">КОНСТРУКТОР 5-6 КЛАСС</h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <button class="btn btn-w" onclick="init('maze')">👾 ЛАБИРИНТ</button>
        <button class="btn btn-w" onclick="init('mole')">🔨 КРОТЫ</button>
        <button class="btn btn-w" onclick="init('anagram')">🔠 БУКВЫ</button>
        <button class="btn btn-w" onclick="init('pairs')">👥 ПАРЫ</button>
        <button class="btn btn-w" onclick="init('quiz')" style="grid-column: span 2;">📝 ТЕСТ-ВИКТОРИНА</button>
    </div>
    <button class="btn btn-p" onclick="importCode()">📥 ЗАГРУЗИТЬ ПРОЕКТ</button>
</div>

<div id="sc-edit" class="screen">
    <div style="display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); z-index: 10; padding: 10px 0;">
        <button class="btn btn-ai" style="flex: 2" onclick="loadAI()">🤖 ИИ: 13 ТЕМ</button>
        <button class="btn btn-w" style="flex: 1" onclick="addNewQ({q:'', a:['','',''], c:0})">➕</button>
    </div>
    <div id="editor-list"></div>
    <button class="btn btn-p" onclick="start()">ИГРАТЬ ▶️</button>
    <button class="btn btn-w" onclick="exportCode()">📤 СОХРАНИТЬ КОД</button>
</div>

<div id="sc-game" class="screen" style="overflow: hidden;">
    <div id="quest-display" style="text-align:center; font-size: 1.3rem; font-weight: 900; margin-bottom: 15px;"></div>
    <div id="stage"></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="game-ui"></div>
</div>

<script>
    let mode = '', questions = [], current = 0, score = 0, busy = false, px = 50, py = 50;
    
    // Загрузка рекорда
    document.getElementById('high-score').innerText = localStorage.getItem('grammaScore') || 0;

    const AI_DATA = {
        1: {t:"Существительное", q:"3-е склонение:", a:["Мать", "Отец", "Окно"], c:0},
        2: {t:"Обращение", q:"Где нужна запятая?", a:["Спи, мой малыш.", "Спи мой малыш.", "Спит малыш."], c:0},
        3: {t:"Типы речи", q:"Текст 'Почему?' это:", a:["Рассуждение", "Описание", "Повествование"], c:0},
        4: {t:"Лексика", q:"Синоним 'Красивый':", a:["Прекрасный", "Ужасный", "Громкий"], c:0},
        5: {t:"Союзы", q:"Перед 'НО' запятая:", a:["Всегда", "Никогда", "Иногда"], c:0},
        6: {t:"Обобщающие", q:"Птицы: орел, сова. Где обобщающее?", a:["Птицы", "Орел", "Сова"], c:0},
        7: {t:"Прямая речь", q:"Какая схема верна?", a:["«П», - а.", "А - П.", "П а."], c:0},
        8: {t:"Подлежащее", q:"Кто? Что?:", a:["Подлежащее", "Сказуемое", "Корень"], c:0},
        9: {t:"Сказуемое", q:"Что делает?:", a:["Сказуемое", "Глагол", "Наречие"], c:0},
        10: {t:"Обстоятельство", q:"Где? Когда?:", a:["Обстоятельство", "Определение", "Дополнение"], c:0},
        11: {t:"Тире", q:"Я - профи. Где тире?", a:["Между С и С", "Между Г и С", "Нет его"], c:0},
        12: {t:"Местоимение", q:"1 лицо ед.ч.:", a:["Я", "Мы", "Ты"], c:0},
        13: {t:"Глагол", q:"Инфинитив глагола 'Бегу':", a:["Бежать", "Бежал", "Бегущий"], c:0}
    };

    function init(m) { mode = m; document.getElementById('sc-menu').classList.remove('active'); document.getElementById('sc-edit').classList.add('active'); }
    
    function addNewQ(d) {
        const div = document.createElement('div'); div.className = 'card-editor';
        const gid = 'g' + Math.random();
        div.innerHTML = `<input class="inp q-v" value="${d.q}" placeholder="ВОПРОС">
            ${d.a.map((v, i) => `<div style="display:flex;gap:10px;align-items:center"><input type="radio" name="${gid}" class="c-v" ${i===d.c?'checked':''}>
            <input class="inp a-v" value="${v}"></div>`).join('')}
            <button onclick="this.parentElement.remove()" style="color:var(--r);border:none;background:none;font-weight:bold;margin-top:10px">УДАЛИТЬ КАРТУ</button>`;
        document.getElementById('editor-list').appendChild(div);
    }

    function loadAI() { Object.keys(AI_DATA).forEach(k => addNewQ(AI_DATA[k])); }

    function start() {
        questions = [];
        document.querySelectorAll('.card-editor').forEach(card => {
            let a = []; card.querySelectorAll('.a-v').forEach((inp, i) => a.push({ t: inp.value, ok: card.querySelectorAll('.c-v')[i].checked }));
            questions.push({ q: card.querySelector('.q-v').value, a });
        });
        if(questions.length) { current = 0; score = 0; showScreen('sc-game'); render(); }
    }

    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function render() {
        busy = false; const q = questions[current]; const st = document.getElementById('stage'); const ui = document.getElementById('game-ui');
        st.innerHTML = ''; ui.innerHTML = ''; document.getElementById('joy-base').style.display = 'none';
        document.getElementById('quest-display').innerText = q.q;

        if(mode === 'maze') {
            document.getElementById('joy-base').style.display = 'block';
            st.innerHTML = '<div id="player"></div>'; px = 30; py = 30; updatePlayer();
            q.a.forEach((opt, i) => {
                let t = document.createElement('div'); t.className = 'mole up'; t.innerText = opt.t;
                t.style.left = (10 + i*30) + "%"; t.style.bottom = "20px";
                t.dataset.ok = opt.ok; st.appendChild(t);
            });
            setupJoy();
        } else if(mode === 'mole') {
            q.a.forEach((opt, i) => {
                let m = document.createElement('div'); m.className = 'mole'; m.innerText = opt.t;
                m.style.left = (5 + i*32) + "%"; st.appendChild(m);
                m.onclick = () => validate(opt.ok, m);
                setInterval(() => m.classList.toggle('up'), 1200 + i*400);
            });
        } else if(mode === 'anagram') {
            let word = q.q.toUpperCase(); let res = "";
            word.split('').sort(()=>Math.random()-0.5).forEach(l => {
                let d = document.createElement('div'); d.className = 'letter'; d.innerText = l;
                d.onclick = () => { if(d.style.opacity === '0.1') return; res += l; d.style.opacity = '0.1';
                document.getElementById('quest-display').innerText = res;
                if(res.length === word.length) validate(res === word, d); };
                st.appendChild(d);
            });
        } else {
            q.a.forEach(opt => {
                let b = document.createElement('button'); b.className = 'btn btn-p'; b.innerText = opt.t;
                b.onclick = () => validate(opt.ok, b); ui.appendChild(b);
            });
        }
    }

    function validate(ok, el) {
        if(busy) return; busy = true;
        el.style.background = ok ? 'var(--s)' : 'var(--r)';
        if(ok) score += 10;
        document.getElementById('sc-val').innerText = score + " ⭐";
        
        // Сохранение рекорда
        let high = localStorage.getItem('grammaScore') || 0;
        if(score > high) { localStorage.setItem('grammaScore', score); document.getElementById('high-score').innerText = score; }

        setTimeout(() => {
            current++;
            if(current < questions.length) render();
            else { alert("ФИНИШ! ТВОЙ РЕЗУЛЬТАТ: " + score); location.reload(); }
        }, 800);
    }

    function updatePlayer() { const p = document.getElementById('player'); if(p) { p.style.left = px+'px'; p.style.top = py+'px'; } }

    function setupJoy() {
        const base = document.getElementById('joy-base'), stick = document.getElementById('joy-stick');
        base.ontouchmove = (e) => {
            let t = e.touches[0], r = base.getBoundingClientRect();
            let x = t.clientX - r.left - 60, y = t.clientY - r.top - 60;
            let ang = Math.atan2(y, x), d = Math.min(Math.sqrt(x*x+y*y), 40);
            stick.style.transform = `translate(${Math.cos(ang)*d}px, ${Math.sin(ang)*d}px)`;
            px = Math.max(10, Math.min(280, px + Math.cos(ang)*8));
            py = Math.max(10, Math.min(350, py + Math.sin(ang)*8));
            updatePlayer();
            document.querySelectorAll('.mole').forEach(m => {
                let r1 = document.getElementById('player').getBoundingClientRect(), r2 = m.getBoundingClientRect();
                if(!(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom)) validate(m.dataset.ok === "true", m);
            });
        };
        base.ontouchend = () => stick.style.transform = 'translate(0,0)';
    }

    // БРОНИРОВАННЫЙ ЭКСПОРТ ДЛЯ GITHUB
    function exportCode() {
        const data = JSON.stringify({m: mode, q: questions});
        const blob = btoa(encodeURIComponent(data).replace(/%([0-9A-F]{2})/g, (m, p) => String.fromCharCode('0x' + p)));
        prompt("ТВОЙ КОД ДЛЯ СОХРАНЕНИЯ:", blob);
    }

    function importCode() {
        const c = prompt("ВСТАВЬ КОД:");
        if(c) {
            try {
                const s = decodeURIComponent(atob(c).split('').map(x => '%' + ('00' + x.charCodeAt(0).toString(16)).slice(-2)).join(''));
                const d = JSON.parse(s); mode = d.m; questions = d.q; start();
            } catch(e) { alert("ОШИБКА КОДА!"); }
        }
    }
</script>
</body>
</html>
