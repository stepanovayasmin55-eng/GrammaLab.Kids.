<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrammaLab.Kids</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #ff4757; --sec: #2f3542; --win: #2ed573; --bg: #f1f2f6; --accent: #1e90ff; }
        body { margin: 0; font-family: 'Comic Sans MS', cursive, sans-serif; background: var(--bg); overflow-x: hidden; }
        
        /* HEADER */
        header { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-bottom: 5px solid var(--main); }
        .logo { font-size: 28px; font-weight: 900; color: var(--main); text-shadow: 2px 2px 0px #eee; }

        /* SCREENS */
        .screen { display: none; padding: 20px; max-width: 900px; margin: 0 auto; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .active { display: block; }
        @keyframes pop { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }

        /* WORDWALL MENU GRID */
        .template-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-top: 20px; }
        .template { background: white; border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; border-bottom: 6px solid #ddd; }
        .template:hover { transform: translateY(-10px); border-bottom-color: var(--accent); }
        .template i { font-size: 50px; display: block; margin-bottom: 10px; }

        /* GAME STAGE */
        #stage { background: white; width: 100%; height: 450px; border-radius: 30px; position: relative; overflow: hidden; border: 8px solid var(--sec); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        
        /* КНОПКИ */
        .btn { padding: 15px 30px; border-radius: 15px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 0 #bbb; background: #eee; margin: 10px; }
        .btn-play { background: var(--main); color: white; box-shadow: 0 6px 0 #b33939; }
        .btn-play:active { transform: translateY(4px); box-shadow: 0 2px 0 #b33939; }
        .btn-ai { background: var(--accent); color: white; box-shadow: 0 6px 0 #0984e3; }

        /* МЕХАНИКИ */
        .mole { width: 90px; height: 120px; background: #8d6e63; position: absolute; bottom: -150px; border-radius: 40px 40px 10px 10px; transition: 0.4s; border: 4px solid #5d4037; color: white; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; cursor: pointer; }
        .mole.up { bottom: 40px; }
        .wheel { width: 340px; height: 340px; border-radius: 50%; border: 10px solid var(--sec); transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1); background: conic-gradient(#ff6b6b 0 45deg, #feca57 45deg 90deg, #48dbfb 90deg 135deg, #ff9f43 135deg 180deg, #54a0ff 180deg 225deg, #5f27cd 225deg 270deg, #ee5253 270deg 315deg, #00d2d3 315deg 360deg); position: relative; }
        .cloud { position: absolute; background: white; padding: 20px; border-radius: 50px; border: 3px solid var(--accent); font-weight: bold; animation: drift 6s linear infinite; cursor: pointer; white-space: nowrap; }
        @keyframes drift { from { left: 110%; } to { left: -150%; } }
        
        /* РЕДАКТОР */
        .q-card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; border-left: 10px solid var(--accent); }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">GrammaLab.Kids</div>
    <div id="stats">🏆 Очки: <span id="score-text">0</span></div>
</header>

<div id="scr-menu" class="screen active">
    <h2 style="text-align:center;">Выбери режим игры:</h2>
    <div class="template-grid">
        <div class="template" onclick="setGame('mole')"><i>🔨</i>Кроты</div>
        <div class="template" onclick="setGame('wheel')"><i>🎡</i>Колесо</div>
        <div class="template" onclick="setGame('plane')"><i>✈️</i>Самолет</div>
        <div class="template" onclick="setGame('anagram')"><i>🔠</i>Слова</div>
        <div class="template" onclick="setGame('slots')"><i>🎰</i>Слоты</div>
        <div class="template" onclick="setGame('pairs')"><i>👥</i>Пары</div>
        <div class="template" onclick="setGame('maze')"><i>👾</i>Лабиринт</div>
        <div class="template" onclick="setGame('quiz')"><i>📝</i>Викторина</div>
    </div>
    <center style="margin-top:40px;">
        <button class="btn" onclick="importGame()">📥 Вставить код задания</button>
    </center>
</div>

<div id="scr-edit" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 id="mode-title">Настройка</h2>
        <button class="btn btn-ai" onclick="aiFill()">✨ ИИ: Генератор</button>
    </div>
    <div id="editor-container"></div>
    <button class="btn" onclick="addQuestion()">➕ Добавить вопрос</button>
    <button class="btn btn-play" onclick="launch()">ИГРАТЬ ▶️</button>
    <button class="btn" style="background:var(--win); color:white; box-shadow: 0 6px 0 #218c74;" onclick="exportGame()">📦 КОД ДЛЯ УЧЕНИКОВ</button>
</div>

<div id="scr-play" class="screen">
    <h2 id="q-display" style="text-align:center; min-height: 50px;"></h2>
    <div id="stage"></div>
    <div id="game-ui" style="text-align:center; margin-top:20px;"></div>
</div>

<script>
    let currentMode = '', questions = [], qIdx = 0, score = 0, wheelRot = 0;

    function nav(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function setGame(m) { 
        currentMode = m; 
        document.getElementById('mode-title').innerText = "Режим: " + m;
        document.getElementById('editor-container').innerHTML = '';
        addQuestion();
        nav('scr-edit');
    }

    function addQuestion(t='', a=['','',''], c=0) {
        const div = document.createElement('div'); div.className = 'q-card';
        const gid = Math.random().toString(36).substr(2,5);
        div.innerHTML = `
            <input type="text" placeholder="Текст вопроса..." value="${t}" class="q-val">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                ${[0,1,2].map(i => `<div><input type="radio" name="${gid}" ${i===c?'checked':''}> <input type="text" value="${a[i]}" class="a-val" placeholder="Ответ ${i+1}"></div>`).join('')}
            </div>
            <button onclick="this.parentElement.remove()" style="position:absolute; top:10px; right:10px; border:none; color:red; cursor:pointer; background:none;">✕</button>
        `;
        document.getElementById('editor-container').appendChild(div);
    }

    function aiFill() {
        const topic = prompt("Тема (не с глаголами, столицы, словарные слова):");
        if(topic) addQuestion("Как пишется (НЕ)ЗНАЛ?", ["Раздельно", "Слитно", "Через дефис"], 0);
    }

    function pack() {
        questions = [];
        document.querySelectorAll('.q-card').forEach(card => {
            const t = card.querySelector('.q-val').value;
            const opts = [];
            card.querySelectorAll('div > div').forEach(row => {
                opts.push({ t: row.querySelector('.a-val').value, ok: row.querySelector('input').checked });
            });
            if(t) questions.push({t, opts});
        });
    }

    function exportGame() {
        pack();
        const code = btoa(unescape(encodeURIComponent(JSON.stringify({m: currentMode, d: questions}))));
        prompt("СКОПИРУЙ ЭТОТ КОД И ОТПРАВЬ УЧЕНИКАМ:", code);
    }

    function importGame() {
        const code = prompt("Вставь код игры:"); if(!code) return;
        const unpacked = JSON.parse(decodeURIComponent(escape(atob(code))));
        currentMode = unpacked.m; questions = unpacked.d; launch();
    }

    function launch() {
        pack(); if(!questions.length) return;
        qIdx = 0; score = 0;
        document.getElementById('score-text').innerText = "0";
        nav('scr-play');
        render();
    }

    function render() {
        const st = document.getElementById('stage'); const ui = document.getElementById('game-ui'); const q = questions[qIdx];
        st.innerHTML = ''; ui.innerHTML = ''; document.getElementById('q-display').innerText = q.t;

        const check = (isOk) => {
            if(isOk) { score++; document.getElementById('score-text').innerText = score; }
            qIdx++;
            if(qIdx < questions.length) render(); else finish();
        };

        if(currentMode === 'mole') {
            q.opts.forEach((o, i) => {
                const m = document.createElement('div'); m.className = 'mole'; m.innerText = o.t;
                m.style.left = (15 + i*30) + '%'; m.onclick = () => check(o.ok);
                st.appendChild(m); setTimeout(() => m.classList.add('up'), 200 + i*300);
            });
        } else if(currentMode === 'wheel') {
            st.innerHTML = `<div style="position:absolute; top:10px; width:0; height:0; border-left:20px solid transparent; border-right:20px solid transparent; border-top:40px solid var(--main); z-index:10;"></div><div id="wheel-obj" class="wheel"></div>`;
            q.opts.forEach((o, i) => {
                const l = document.createElement('div'); l.style = `position:absolute; width:100%; top:45%; text-align:center; transform:rotate(${i*(360/q.opts.length)}deg); color:white; font-weight:bold;`;
                l.innerText = o.t; document.getElementById('wheel-obj').appendChild(l);
            });
            ui.innerHTML = `<button class="btn btn-play" onclick="spinWheel()">КРУТИТЬ! 🎡</button>`;
        } else if(currentMode === 'plane') {
            q.opts.forEach((o, i) => {
                const c = document.createElement('div'); c.className = 'cloud'; c.innerText = o.t;
                c.style.top = (50 + i*110) + "px"; c.style.animationDelay = (i*0.7) + "s";
                c.onclick = () => check(o.ok); st.appendChild(c);
            });
        } else if(currentMode === 'anagram') {
            const correct = q.opts.find(o => o.ok).t;
            const letters = correct.split('').sort(() => Math.random() - 0.5);
            let currentWord = "";
            st.innerHTML = `<h1 id="word-box" style="font-size:60px; color:var(--accent); letter-spacing:10px;">_</h1>`;
            letters.forEach(l => {
                const b = document.createElement('button'); b.className = 'btn'; b.innerText = l;
                b.onclick = () => { 
                    currentWord += l; document.getElementById('word-box').innerText = currentWord;
                    if(currentWord.length === correct.length) check(currentWord === correct);
                };
                ui.appendChild(b);
            });
        } else {
            // Викторина и остальные
            q.opts.forEach(o => {
                const b = document.createElement('button'); b.className = 'btn btn-play'; b.innerText = o.t;
                b.onclick = () => check(o.ok); ui.appendChild(b);
            });
        }
    }

    function spinWheel() {
        const w = document.getElementById('wheel-obj');
        wheelRot += 1800 + Math.random() * 360;
        w.style.transform = `rotate(${wheelRot}deg)`;
        setTimeout(() => {
            const randIdx = Math.floor(Math.random() * questions[qIdx].opts.length);
            alert("Выпало: " + questions[qIdx].opts[randIdx].t);
            if(questions[qIdx].opts[randIdx].ok) { score++; document.getElementById('score-text').innerText = score; }
            qIdx++; if(qIdx < questions.length) render(); else finish();
        }, 4000);
    }

    function finish() {
        document.getElementById('q-display').innerText = "ПОЗДРАВЛЯЕМ!";
        document.getElementById('stage').innerHTML = `
            <div style="text-align:center; padding-top:100px;">
                <h1 style="font-size:50px;">Твой результат:</h1>
                <div style="font-size:100px; color:var(--main); font-weight:900;">${score} / ${questions.length}</div>
                <button class="btn btn-play" onclick="location.reload()">ИГРАТЬ СНОВА</button>
            </div>
        `;
        // ЗАПУСК КОНФЕТТИ
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }
</script>
</body>
</html>
