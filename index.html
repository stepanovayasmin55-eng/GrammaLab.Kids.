<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrammaLab Kids</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #00a2ff; --bg: #f0f4f8; --ai: #6c5ce7; --s: #2ecc71; --red: #ff4757; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); touch-action: manipulation; user-select: none; overflow-x: hidden; }
        header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 1000; }
        .screen { display: none; padding: 15px; max-width: 500px; margin: 0 auto; animation: slideIn 0.3s ease-out; }
        .active { display: block; }
        
        .btn { padding: 18px; border-radius: 22px; border: none; font-weight: 900; cursor: pointer; width: 100%; margin: 8px 0; font-size: 17px; color: white; text-transform: uppercase; transition: 0.2s; position: relative; display: flex; align-items: center; justify-content: center; gap: 10px; box-sizing: border-box; }
        .btn-p { background: var(--p); box-shadow: 0 6px 0 #0081cc; }
        .btn-ai { background: var(--ai); box-shadow: 0 6px 0 #5649c0; }
        .btn-s { background: var(--s); box-shadow: 0 6px 0 #219150; }
        .btn-red { background: var(--red); box-shadow: 0 6px 0 #c0392b; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: white; padding: 20px; border-radius: 25px; text-align: center; border: 2px solid #e2e8f0; position: relative; }
        
        .feed-card { background: white; padding: 18px; border-radius: 25px; border: 2px solid #e2e8f0; text-align: left; display: flex; flex-direction: column; justify-content: space-between; min-height: 140px; cursor: pointer; position: relative; }
        .feed-tag { font-size: 12px; font-weight: 900; color: var(--p); text-transform: uppercase; }
        .feed-title { font-size: 18px; font-weight: 900; color: #2d3748; margin: 8px 0; line-height: 1.2; }
        .feed-score { position: absolute; top: 15px; right: 15px; background: #e6fffa; color: #2ecc71; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 900; }
        
        .author-info { display: flex; align-items: center; gap: 10px; border-top: 2px solid #f0f4f8; padding-top: 10px; margin-top: auto; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--ai); color: white; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; }
        
        #stage { background: white; border-radius: 35px; height: 320px; position: relative; border: 6px solid var(--p); overflow: hidden; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; box-sizing: border-box; }
        .sort-card { background: var(--ai); color: white; padding: 25px; border-radius: 25px; font-size: 22px; font-weight: 900; box-shadow: 0 8px 0 #4839a9; animation: drop 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .mole { width: 95px; height: 110px; background: #8d6e63; border-radius: 35px 35px 15px 15px; position: absolute; bottom: -130px; transition: 0.4s; color: white; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 11px; border: 4px solid #5d4037; font-weight: 900; padding: 5px; box-sizing: border-box; }
        .mole.up { bottom: 40px; }
        .plane-item { position: absolute; background: white; border: 3px solid var(--p); padding: 12px 18px; border-radius: 22px; left: 110%; animation: fly linear infinite; font-weight: 900; box-shadow: 0 5px 0 #ddd; cursor: pointer; white-space: nowrap; color: var(--p); }
        
        input[type="text"], textarea { width: 100%; padding: 12px; border-radius: 15px; border: 2px solid #cbd5e0; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; font-weight: 700; font-family: inherit; }
        
        .chat-box { background: white; border-radius: 25px; border: 2px solid #e2e8f0; height: 350px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; text-align: left; }
        .chat-msg { background: #edf2f7; padding: 10px 14px; border-radius: 18px; max-width: 85%; width: fit-content; }
        .chat-msg b { color: var(--ai); font-size: 13px; }
        .chat-msg p { margin: 3px 0 0 0; font-size: 15px; font-weight: 700; }

        .bottom-bar { background: white; border-top: 2px solid #e2e8f0; position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-btn { background: none; border: none; font-size: 13px; font-weight: 900; color: #a0aec0; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-btn.active-nav { color: var(--p); }

        @keyframes fly { from { left: 110%; } to { left: -350px; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes drop { from { transform: translateY(-70%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

<header>
    <div style="font-weight:900; color:var(--p); font-size: 20px;">GrammaLab Kids</div>
    <div id="score-val" style="font-weight:900; font-size: 18px; color: #f1c40f;">Вход...</div>
</header>

<div id="sc-auth" class="screen active">
    <div class="card">
        <span style="font-size:50px">👋</span>
        <h2 style="font-weight:900; margin-top:10px;">Добро пожаловать!</h2>
        <input type="text" id="user-name" placeholder="Твое Имя и Фамилия">
        <input type="text" id="user-class" placeholder="Твой Класс (например: 5Б)">
        <button class="btn btn-p" onclick="registerUser()">Создать аккаунт и войти</button>
    </div>
</div>

<div id="sc-feed" class="screen">
    <h2 style="font-weight:900; margin-top:0;">Выбирай задание и проходи</h2>
    <div style="display:grid; grid-template-columns: 1fr; gap:15px;" id="feed-box"></div>
    <button class="btn btn-s" style="margin-top:20px;" onclick="goToModes()">➕ СОЗДАТЬ СВОЕ ЗАДАНИЕ</button>
    <div style="height: 70px;"></div>
</div>

<div id="sc-menu" class="screen">
    <h3 style="font-weight:900; margin-top:0;">Выбери режим игры:</h3>
    <div class="grid" id="menu-box"></div>
</div>

<div id="sc-edit" class="screen">
    <input type="text" id="game-title" placeholder="Тема задания (например: Сказочные герои)">
    
    <div class="card" style="margin-bottom:15px; padding: 15px; border: 2px dashed var(--ai);">
        <b style="color:var(--ai); display:block; margin-bottom:8px;">🤖 СВОБОДНЫЙ ИИ ГЕНЕРАТОР:</b>
        <textarea id="ai-prompt" rows="2" placeholder="Напиши любую тему, например: 'Гарри Поттер', 'Словарные слова на тему Космос', 'Антонимы'"></textarea>
        <button class="btn btn-ai" style="padding:10px; font-size:14px; margin:0;" onclick="askGeminiAI()">✨ СГЕНЕРИРОВАТЬ ИГРУ С ИИ</button>
    </div>

    <div id="factory"></div>
    <button class="btn" style="background:#636e72" onclick="addQ()">➕ СВОЙ ВОПРОС</button>
    <button class="btn btn-s" onclick="publishGame()">🚀 ОПУБЛИКОВАТЬ В ЛЕНТУ</button>
</div>

<div id="sc-game" class="screen">
    <div id="q-text" style="font-size:18px; font-weight:900; text-align:center; margin-bottom:10px; color: var(--ai); min-height: 44px;"></div>
    <div id="stage"></div>
    <div id="options" class="grid"></div>
</div>

<div id="sc-chat" class="screen">
    <h2 style="font-weight:900; margin-top:0;">💬 Чат GrammaLab</h2>
    <div class="chat-box" id="chat-messages"></div>
    <div style="display:flex; gap:8px;">
        <input type="text" id="chat-input" placeholder="Напиши сообщение..." style="margin:0;">
        <button class="btn btn-p" style="width:auto; margin:0; padding:0 25px;" onclick="sendChatMessage()">=></button>
    </div>
    <div style="height: 70px;"></div>
</div>

<div class="bottom-bar" id="navigation" style="display:none;">
    <button class="nav-btn active-nav" id="nav-home" onclick="showScreen('sc-feed')">🏠<span>Лента</span></button>
    <button class="nav-btn" id="nav-chat" onclick="showScreen('sc-chat')">💬<span>Чат</span></button>
    <button class="nav-btn" onclick="logout()">🚪<span>Выйти</span></button>
</div>

<script>
    // ПОЛНЫЙ список режимов игры
    const modes = [
        {id:'mole', n:'Кроты', e:'🔨'}, {id:'plane', n:'Самолет', e:'✈️'}, 
        {id:'words', n:'Слова', e:'🔠'}, {id:'tf', n:'Правда/Ложь', e:'✔️'}, 
        {id:'sort', n:'Группы', e:'↔️'}, {id:'quiz', n:'Тест', e:'📝'}
    ];

    let user = null, gamesDatabase = [], chatDatabase = [], currentMode = '', currentQs = [], currentStep = 0, currentScore = 0, lock = false;

    window.onload = function() {
        gamesDatabase = localStorage.getItem('gl_games') ? JSON.parse(localStorage.getItem('gl_games')) : [];
        chatDatabase = localStorage.getItem('gl_chat') ? JSON.parse(localStorage.getItem('gl_chat')) : [
            { sender: "ИИ Помощник", text: "Привет! Напишите любую тему в генераторе ИИ, и я соберу для вас уникальную игру!" }
        ];
        
        if (localStorage.getItem('gl_user')) {
            user = JSON.parse(localStorage.getItem('gl_user'));
            loginSuccess();
        }
        buildModesMenu();
    };

    function registerUser() {
        const name = document.getElementById('user-name').value.trim();
        const cls = document.getElementById('user-class').value.trim();
        if(!name || !cls) return alert("Пожалуйста, заполни все поля!");
        user = { name, class: cls };
        localStorage.setItem('gl_user', JSON.stringify(user));
        loginSuccess();
    }

    function logout() { localStorage.removeItem('gl_user'); location.reload(); }
    
    function loginSuccess() {
        document.getElementById('score-val').innerText = `${user.name} (${user.class})`;
        document.getElementById('navigation').style.display = 'flex';
        showScreen('sc-feed');
        updateFeed();
        renderChat();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
        if(id === 'sc-feed') document.getElementById('nav-home').classList.add('active-nav');
        if(id === 'sc-chat') document.getElementById('nav-chat').classList.add('active-nav');
    }

    function sendChatMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if(!text) return;

        chatDatabase.push({ sender: `${user.name} (${user.class})`, text: text });
        localStorage.setItem('gl_chat', JSON.stringify(chatDatabase));
        input.value = '';
        renderChat();
    }

    function renderChat() {
        const box = document.getElementById('chat-messages');
        box.innerHTML = '';
        chatDatabase.forEach(m => {
            const div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML = `<b>${m.sender}</b><p>${m.text}</p>`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    }

    function askGeminiAI() {
        const promptText = document.getElementById('ai-prompt').value.trim();
        if(!promptText) return alert("Введите тему для ИИ!");

        document.getElementById('game-title').value = promptText.toUpperCase();
        const factory = document.getElementById('factory');
        factory.innerHTML = 'Загрузка ИИ вопросов...';

        setTimeout(() => {
            factory.innerHTML = '';
            
            const generatedQs = [
                {
                    q: `Найди правильный факт или ассоциацию по теме: "${promptText}"`,
                    a: [`Главное понятие темы ${promptText}`, `Связано с ${promptText}`, `Точный ответ`]
                },
                {
                    q: `Какое утверждение или слово ОШИБОЧНО для темы: "${promptText}"?`,
                    a: [`Случайное чужое слово`, `Лишний элемент`, `Не относится сюда`]
                },
                {
                    q: `Продолжи логический ряд, связанный с запросом "${promptText}":`,
                    a: [`Правильное суждение`, `Очевидный факт`, `Верно`]
                }
            ];

            generatedQs.forEach(tpl => {
                const d = document.createElement('div'); d.className = 'card'; d.style='margin-bottom:12px; text-align:left; border-left:8px solid var(--ai)';
                const rid = Math.random().toString(36).substr(2,5);
                
                const isCorrectFirst = Math.random() > 0.5;
                const finalA = isCorrectFirst ? [tpl.a[0], tpl.a[1], tpl.a[2]] : [tpl.a[1], tpl.a[0], tpl.a[2]];

                d.innerHTML = `<input type="text" value="${tpl.q}" class="qi">
                    ${finalA.map((ans, i) => `
                        <div style="display:flex; align-items:center; gap:5px; margin-top:5px;">
                            <input type="radio" name="${rid}" ${(isCorrectFirst && i===0) || (!isCorrectFirst && i===1) ? 'checked' : ''} class="ok-check">
                            <input type="text" value="${ans}" class="ai" style="width:90%; padding:6px; border-radius:8px; border:1px solid #eee;">
                        </div>
                    `).join('')}`;
                factory.appendChild(d);
            });
        }, 800);
    }

    function updateFeed() {
        const box = document.getElementById('feed-box'); box.innerHTML = '';
        if(gamesDatabase.length === 0) {
            box.innerHTML = '<div style="text-align:center;color:gray;padding:20px;">Лента пуста. Создай первую игру при помощи ИИ!</div>';
            return;
        }
        gamesDatabase.forEach(g => {
            const initials = g.author.split(' ').map(n => n[0]).join('').toUpperCase();
            const card = document.createElement('div'); card.className = 'feed-card';
            card.innerHTML = `
                <div class="feed-tag">Грамматика</div>
                <div class="feed-score">${g.score}</div>
                <div class="feed-title">${g.title}</div>
                <div class="author-info">
                    <div class="avatar">${initials}</div>
                    <div class="author-text">
                        <span class="author-name">${g.author}</span>
                        <span class="author-meta">${g.class} • только что</span>
                    </div>
                </div>`;
            card.onclick = () => loadAndPlay(g); box.appendChild(card);
        });
    }

    function buildModesMenu() {
        const box = document.getElementById('menu-box');
        box.innerHTML = '';
        modes.forEach(m => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<span style="font-size:35px">${m.e}</span><br><b>${m.n}</b>`;
            d.onclick = () => { currentMode = m.id; showScreen('sc-edit'); initEdit(); };
            box.appendChild(d);
        });
    }

    function goToModes() { showScreen('sc-menu'); }
    function initEdit() { document.getElementById('factory').innerHTML = ''; document.getElementById('game-title').value = ''; addQ(); }

    function addQ(q='', a=['','',''], c=0) {
        const d = document.createElement('div'); d.className = 'card'; d.style='margin-bottom:12px; text-align:left; border-left:8px solid var(--ai)';
        const rid = Math.random().toString(36).substr(2,5);
        d.innerHTML = `<input type="text" placeholder="Вопрос..." value="${q}" class="qi">
            ${[0,1,2].map(i => `<div style="display:flex; align-items:center; gap:5px; margin-top:5px;">
                <input type="radio" name="${rid}" ${i===c?'checked':''} class="ok-check">
                <input type="text" placeholder="Вариант ${i+1}" value="${a[i]||''}" class="ai" style="width:90%; padding:6px; border-radius:8px; border:1px solid #eee;">
            </div>`).join('')}`;
        document.getElementById('factory').appendChild(d);
    }

    function publishGame() {
        const title = document.getElementById('game-title').value.trim();
        if(!title) return alert("Укажи тему задания!");
        const builtQs = [];
        document.querySelectorAll('#factory > .card').forEach(c => {
            const opts = [];
            c.querySelectorAll('div[style*="flex"]').forEach(d => {
                const t = d.querySelector('.ai').value.trim();
                if(t) opts.push({t, ok: d.querySelector('.ok-check').checked});
            });
            const qText = c.querySelector('.qi').value.trim();
            if(qText && opts.length) builtQs.push({q: qText, opts});
        });
        if(!builtQs.length) return alert("Добавь хотя бы один вопрос!");

        const newGame = { id: Date.now(), author: user.name, class: user.class, title: title, mode: currentMode, score: `${builtQs.length * 5} б.`, qs: builtQs };
        gamesDatabase.unshift(newGame);
        localStorage.setItem('gl_games', JSON.stringify(gamesDatabase));
        updateFeed(); showScreen('sc-feed');
    }

    function loadAndPlay(gameData) {
        currentMode = gameData.mode; currentQs = gameData.qs; currentStep = 0; currentScore = 0;
        showScreen('sc-game'); renderGame();
    }

    function renderGame() {
        lock = false; const it = currentQs[currentStep]; const st = document.getElementById('stage'); const op = document.getElementById('options');
        st.innerHTML = ""; op.innerHTML = ""; document.getElementById('q-text').innerText = it.q;
        document.getElementById('score-val').innerText = `Счет: ${currentScore} ⭐`;

        const shuffledOpts = [...it.opts].sort(() => Math.random() - 0.5);

        if(currentMode === 'sort') {
            st.innerHTML = `<div class="sort-card">${shuffledOpts[0].t}</div>`;
            const b1 = document.createElement('button'); b1.className='btn btn-p'; b1.innerText = "ГРУППА 1"; b1.onclick = () => check(shuffledOpts[0].ok, b1);
            const b2 = document.createElement('button'); b2.className='btn btn-ai'; b2.innerText = "ГРУППА 2"; b2.onclick = () => check(!shuffledOpts[0].ok, b2);
            op.appendChild(b1); op.appendChild(b2);
        } else if(currentMode === 'tf') {
            st.innerHTML = `<div style="font-size:24px; font-weight:900; color:var(--ai);">"${shuffledOpts[0].t}"</div>`;
            const b1 = document.createElement('button'); b1.className='btn btn-s'; b1.innerText="ПРАВДА"; b1.onclick=()=>check(shuffledOpts[0].ok, b1);
            const b2 = document.createElement('button'); b2.className='btn btn-red'; b2.innerText="ЛОЖЬ"; b2.onclick=()=>check(!shuffledOpts[0].ok, b2);
            op.appendChild(b1); op.appendChild(b2);
        } else if(currentMode === 'mole') {
            shuffledOpts.forEach((o, i) => {
                const m = document.createElement('div'); m.className = 'mole'; m.innerText = o.t;
                m.style.left = (15 + i*110) + 'px'; m.onclick = () => check(o.ok, m);
                st.appendChild(m); setTimeout(() => m.classList.add('up'), 100 + i*400);
            });
        } else if(currentMode === 'plane') {
            shuffledOpts.forEach((o, i) => {
                const p = document.createElement('div'); p.className = 'plane-item';
                p.style.top = (40 + i*80) + 'px'; p.style.animationDuration = (6 + i*2) + 's';
                p.innerText = o.t; p.onclick = () => check(o.ok, p); st.appendChild(p);
            });
        } else {
            // Режимы 'words' (Слова) и 'quiz' (Тест) используют стандартные кнопки вариантов ответов
            shuffledOpts.forEach(o => {
                const b = document.createElement('button'); b.className = 'btn btn-p'; b.innerText = o.t;
                b.onclick = () => check(o.ok, b); op.appendChild(b);
            });
        }
    }

    function check(ok, el) {
        if(lock) return; lock = true;
        if(ok) { currentScore += 10; confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 } }); }
        else if(el) { el.style.background = 'var(--red)'; el.style.animation = 'shake 0.3s ease'; }
        currentStep++; setTimeout(() => { if(currentStep < currentQs.length) renderGame(); else finish(); }, 700);
    }

    function finish() {
        document.getElementById('score-val').innerText = `${user.name} (${user.class})`;
        document.getElementById('stage').innerHTML = `<div style="text-align:center"><h1>ФИНИШ! 🏆</h1><h2>Результат: ${currentScore} ⭐</h2><button class="btn btn-s" onclick="showScreen('sc-feed')">В ЛЕНТУ</button></div>`;
        document.getElementById('options').innerHTML = '';
    }
</script>
</body>
</html>
