<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordWall PRO: Animated Edition</title>
    <style>
        :root {
            --primary: #2563eb;
            --accent: #f59e0b;
            --bg: #f0f4f8;
            --white: #ffffff;
            --dark: #1e293b;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            overflow-x: hidden;
        }

        /* --- АНИМАЦИИ ВХОДА --- */
        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .screen {
            display: none;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .active { display: block; }

        /* --- ГЛАВНОЕ МЕНЮ --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: var(--white);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 12px 25px rgba(37, 99, 235, 0.2);
        }

        .card i { font-size: 50px; display: block; margin-bottom: 10px; transition: transform 0.3s ease; }
        .card:hover i { transform: scale(1.2) rotate(5deg); }

        /* --- ИГРОВОЕ ПОЛЕ --- */
        #viewport {
            background: white;
            width: 100%;
            height: 450px;
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            border: 6px solid var(--dark);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* АНИМАЦИЯ КРОТА */
        .mole {
            width: 90px; height: 120px;
            background: #78350f;
            position: absolute;
            bottom: -150px;
            border-radius: 45px 45px 10px 10px;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 5px solid #451a03;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            padding: 10px;
            box-sizing: border-box;
        }
        .mole.up { bottom: 40px; }

        /* АНИМАЦИЯ КОЛЕСА */
        .wheel-container {
            position: relative;
            width: 320px; height: 320px;
        }
        .wheel {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 8px solid var(--dark);
            background: conic-gradient(#ff7675 0 90deg, #fdcb6e 90deg 180deg, #74b9ff 180deg 270deg, #55efc4 270deg 360deg);
            transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
        }
        .pointer {
            position: absolute; top: -10px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 20px solid transparent; border-right: 20px solid transparent;
            border-top: 40px solid #d63031; z-index: 10;
        }

        /* --- КНОПКИ --- */
        .btn {
            background: var(--primary);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 0 #1d4ed8;
            transition: 0.1s;
            margin: 5px;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1d4ed8;
        }
    </style>
</head>
<body>

<div id="home" class="screen active">
    <h1 style="text-align:center; color: var(--dark);">WordWall <span style="color:var(--primary)">PRO</span></h1>
    <div class="grid">
        <div class="card" onclick="initGame('mole')"><i>🔨</i><h3>Погоня</h3></div>
        <div class="card" onclick="initGame('wheel')"><i>🎡</i><h3>Колесо</h3></div>
        <div class="card" onclick="initGame('slots')"><i>🎰</i><h3>Автомат</h3></div>
        <div class="card" onclick="initGame('anagram')"><i>🔠</i><h3>Анаграмма</h3></div>
    </div>
    <div style="text-align:center; margin-top:40px;">
        <button class="btn" style="background:#10b981; box-shadow: 0 5px 0 #059669;" onclick="importGame()">📥 ЗАГРУЗИТЬ КОД</button>
    </div>
</div>

<div id="editor" class="screen">
    <h2>Настройка вопросов</h2>
    <div id="questions-list"></div>
    <button class="btn" onclick="addQ()">+ Добавить вопрос</button>
    <button class="btn" onclick="startGame()">ИГРАТЬ ▶️</button>
    <button class="btn" style="background:#8b5cf6; box-shadow: 0 5px 0 #7c3aed;" onclick="exportGame()">📦 ПОЛУЧИТЬ КОД</button>
</div>

<div id="game" class="screen">
    <h2 id="q-title" style="text-align:center;"></h2>
    <div id="viewport"></div>
    <div id="game-controls" style="text-align:center; margin-top:20px;"></div>
</div>

<script>
    let mode = '', qs = [], cur = 0, score = 0, rot = 0;

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function initGame(m) {
        mode = m;
        qs = [];
        document.getElementById('questions-list').innerHTML = '';
        addQ();
        nav('editor');
    }

    function addQ(txt='', ans=['','',''], c=0) {
        const div = document.createElement('div');
        div.style = "background:white; padding:20px; border-radius:15px; margin-bottom:10px; position:relative;";
        div.className = "q-item";
        div.innerHTML = `
            <input type="text" placeholder="Вопрос..." value="${txt}" class="main-q" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                ${[0,1,2].map(i => `
                    <div style="display:flex; gap:5px;">
                        <input type="radio" name="r_${Date.now()}" ${i===c?'checked':''}>
                        <input type="text" placeholder="Ответ" value="${ans[i]||''}" class="ans-v" style="width:100%; border-radius:5px; border:1px solid #eee; padding:5px;">
                    </div>
                `).join('')}
            </div>
        `;
        document.getElementById('questions-list').appendChild(div);
    }

    function exportGame() {
        saveData();
        const code = btoa(unescape(encodeURIComponent(JSON.stringify({m:mode, d:qs}))));
        prompt("Твой код игры (передай другу):", code);
    }

    function importGame() {
        const code = prompt("Вставь код:");
        if(!code) return;
        const data = JSON.parse(decodeURIComponent(escape(atob(code))));
        mode = data.m; qs = data.d; startGame();
    }

    function saveData() {
        qs = [];
        document.querySelectorAll('.q-item').forEach(item => {
            const q = item.querySelector('.main-q').value;
            const opts = [];
            item.querySelectorAll('.ans-v').forEach((v, i) => {
                opts.push({ t: v.value, ok: item.querySelectorAll('input[type="radio"]')[i].checked });
            });
            if(q) qs.push({q, opts});
        });
    }

    function startGame() {
        saveData();
        if(!qs.length) return;
        cur = 0; score = 0;
        nav('game');
        renderGame();
    }

    function renderGame() {
        const v = document.getElementById('viewport');
        const c = document.getElementById('game-controls');
        const q = qs[cur];
        v.innerHTML = ''; c.innerHTML = '';
        document.getElementById('q-title').innerText = q.q;

        const next = (ok) => {
            if(ok) score++;
            cur++;
            if(cur < qs.length) renderGame();
            else v.innerHTML = `<h2>Финал! Счет: ${score}/${qs.length}</h2><button class="btn" onclick="nav('home')">В меню</button>`;
        };

        if(mode === 'mole') {
            q.opts.forEach((o, i) => {
                const mole = document.createElement('div');
                mole.className = 'mole'; mole.innerText = o.t;
                mole.style.left = (15 + i * 30) + '%';
                mole.onclick = () => next(o.ok);
                v.appendChild(mole);
                setTimeout(() => mole.classList.add('up'), 100 + i * 200);
            });
        } else if(mode === 'wheel') {
            v.innerHTML = `<div class="wheel-container"><div class="pointer"></div><div class="wheel" id="w"></div></div>`;
            c.innerHTML = `<button class="btn" onclick="spinWheel()">КРУТИТЬ! 🎡</button>`;
        } else {
            q.opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn'; b.innerText = o.t;
                b.onclick = () => next(o.ok);
                c.appendChild(b);
            });
        }
    }

    function spinWheel() {
        const w = document.getElementById('w');
        rot += 1440 + Math.random() * 360;
        w.style.transform = `rotate(${rot}deg)`;
        setTimeout(() => {
            const res = qs[cur].opts[Math.floor(Math.random()*3)];
            alert("Выпало: " + res.t);
            if(res.ok) score++;
            cur++; if(cur < qs.length) renderGame(); else renderGame();
        }, 4100);
    }
</script>
</body>
</html>
